<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Admin Perpustakaan Nagari</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .table-container::-webkit-scrollbar { height: 8px; width: 8px; }
        .table-container::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .table-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .table-container::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .bg-pattern {
            background-color: #047857; 
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23059669' fill-opacity='0.4'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        .loader {
            border: 3px solid #f3f3f3; border-top: 3px solid white; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none;
        }
        .loader-dark {
            border: 3px solid #f3f3f3; border-top: 3px solid #059669; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-800 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-pattern text-white shadow-lg border-b-4 border-yellow-400">
        <div class="max-w-7xl mx-auto px-4 py-5 sm:px-6 lg:px-8 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-4">
                <div class="bg-white p-2 rounded-lg shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-emerald-700" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-wide">Sistem Admin Buku Tamu</h1>
                    <p class="text-emerald-100 text-sm font-medium">Panel Kendali Data Perpustakaan Nagari</p>
                </div>
            </div>
            <div class="text-center sm:text-right bg-black/20 p-2 px-4 rounded-lg backdrop-blur-sm">
                <p id="currentDate" class="text-sm text-emerald-50"></p>
                <p id="currentTime" class="font-bold text-xl tracking-wider"></p>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8 w-full">
        <div class="flex flex-col lg:flex-row gap-8">
            
            <!-- Form Section -->
            <div class="w-full lg:w-1/3 bg-white p-6 rounded-2xl shadow-md border border-gray-100 h-fit">
                <h2 class="text-xl font-bold border-b-2 border-emerald-100 pb-3 mb-6 flex items-center gap-2 text-emerald-800">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                    Input Data Baru
                </h2>
                
                <form id="visitorForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Nama Lengkap <span class="text-red-500">*</span></label>
                        <input type="text" name="nama" required placeholder="Masukkan nama" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1.5">No. Identitas (NIK/NISN) <span class="text-red-500">*</span></label>
                        <input type="text" name="identitas" required placeholder="NIK atau NISN" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Umur <span class="text-red-500">*</span></label>
                            <input type="number" name="umur" required min="1" placeholder="Thn" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1.5">J.Kelamin <span class="text-red-500">*</span></label>
                            <select name="jk" required class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
                                <option value="" disabled selected>Pilih</option>
                                <option value="L">L</option>
                                <option value="P">P</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Pekerjaan/Status <span class="text-red-500">*</span></label>
                        <select name="kategori" required class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
                            <option value="Pelajar (SD/SMP/SMA)">Pelajar (SD/SMP/SMA)</option>
                            <option value="Mahasiswa">Mahasiswa</option>
                            <option value="Petani/Pekebun">Petani / Pekebun</option>
                            <option value="Wiraswasta/Pedagang">Wiraswasta / Pedagang</option>
                            <option value="PNS/Pegawai Nagari">PNS / Pegawai</option>
                            <option value="Ibu Rumah Tangga">Ibu Rumah Tangga</option>
                            <option value="Lainnya">Lainnya</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Asal Jorong <span class="text-red-500">*</span></label>
                        <input type="text" name="alamat" required placeholder="Jorong asal" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Tujuan <span class="text-red-500">*</span></label>
                        <select name="tujuan" required class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
                            <option value="Membaca Buku">Membaca Buku</option>
                            <option value="Meminjam Buku">Meminjam Buku</option>
                            <option value="Mengembalikan Buku">Mengembalikan Buku</option>
                            <option value="Mengerjakan Tugas/Belajar">Belajar</option>
                            <option value="Lainnya">Lainnya</option>
                        </select>
                    </div>
                    <div class="pt-4">
                        <button type="submit" id="submitBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition-all flex justify-center items-center gap-2">
                            <span id="btnText">Simpan Data</span>
                            <div id="loadingSpinner" class="loader"></div>
                        </button>
                    </div>
                </form>
            </div>

            <!-- Table Section -->
            <div class="w-full lg:w-2/3 bg-white p-6 rounded-2xl shadow-md border border-gray-100 flex flex-col">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b-2 border-emerald-100 pb-3 mb-5 gap-4">
                    <h2 class="text-xl font-bold flex items-center gap-2 text-emerald-800">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4" />
                        </svg>
                        Database Pengunjung (Live)
                    </h2>
                    <div class="flex flex-wrap gap-2">
                        <!-- LINK GOOGLE SHEETS DITAMBAHKAN DI SINI -->
                        <a href="https://docs.google.com/spreadsheets/d/1bTBc8DL8wcI4gvIMvJWrj3vRSvURcGhsBDxh1C5TH1E/edit?usp=sharing" target="_blank" class="bg-green-100 hover:bg-green-200 text-green-800 px-3 py-1.5 rounded-lg text-sm font-semibold flex items-center gap-1 transition">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                            </svg>
                            Kelola di Sheets
                        </a>

                        <button onclick="loadData()" id="refreshBtn" class="bg-blue-100 hover:bg-blue-200 text-blue-800 px-3 py-1.5 rounded-lg text-sm font-semibold flex items-center gap-1 transition">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                            </svg>
                            Segarkan Data
                        </button>
                    </div>
                </div>

                <div class="table-container overflow-x-auto flex-grow rounded-xl border border-gray-200 relative">
                    
                    <!-- Loading Overlay Table -->
                    <div id="tableLoading" class="absolute inset-0 bg-white/80 z-10 flex flex-col items-center justify-center backdrop-blur-sm" style="display: none;">
                        <div id="loadingSpinnerTable" class="loader-dark mb-2"></div>
                        <p class="text-emerald-700 font-semibold text-sm animate-pulse text-center px-4" id="loadingText">Menarik data dari Google Sheets...</p>
                    </div>

                    <table class="w-full text-sm text-left text-gray-600 whitespace-nowrap">
                        <thead class="text-xs text-gray-700 uppercase bg-emerald-50 border-b-2 border-emerald-100">
                            <tr>
                                <th class="px-4 py-3 font-bold">Tgl/Waktu</th>
                                <th class="px-4 py-3 font-bold">Nama / NIK</th>
                                <th class="px-4 py-3 font-bold">U/JK</th>
                                <th class="px-4 py-3 font-bold">Status</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- Data dimuat oleh JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 bg-emerald-600 text-white px-6 py-4 rounded-xl shadow-2xl flex items-center gap-3 z-50">
        <span id="toastMessage" class="font-semibold">Aksi berhasil!</span>
    </div>

    <script>
        // ==========================================
        // URL WEB APP ANDA
        // ==========================================
        const scriptURL = 'https://script.google.com/macros/s/AKfycbywOsVPsw4v5byzuKCFomgYTpBI8Tdafpf56Iy7h6W3HRfqwOLB6hxbz3j6WeBV5_jP9Q/exec';
        // ==========================================

        // Clock Script
        function updateClock() {
            const now = new Date();
            document.getElementById('currentDate').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById('currentTime').innerText = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) + ' WIB';
        }
        setInterval(updateClock, 1000); updateClock();

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.className = `fixed bottom-5 right-5 transform transition-all duration-300 text-white px-6 py-4 rounded-xl shadow-2xl flex items-center gap-3 z-50 ${isError ? 'bg-red-500' : 'bg-emerald-600'}`;
            document.getElementById('toastMessage').innerText = message;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        // --- READ DATA (Membaca Data dari Sheets) ---
        function loadData() {
            if(!scriptURL || scriptURL.includes('MASUKKAN_URL')) return;

            const tableLoading = document.getElementById('tableLoading');
            const loadingText = document.getElementById('loadingText');
            const loadingSpinnerTable = document.getElementById('loadingSpinnerTable');

            tableLoading.style.display = 'flex';
            if(loadingSpinnerTable) loadingSpinnerTable.style.display = 'block';
            if(loadingText) {
                loadingText.className = "text-emerald-700 font-semibold text-sm animate-pulse text-center px-4";
                loadingText.innerText = "Menarik data dari Google Sheets...";
            }
            
            fetch(scriptURL)
                .then(response => response.json())
                .then(result => {
                    if(result.status === "success" && result.data) {
                        renderTable(result.data);
                    } else {
                        throw new Error("Format data tidak sesuai.");
                    }
                    tableLoading.style.display = 'none';
                })
                .catch(error => {
                    console.error('Error fetching data:', error);
                    if(loadingSpinnerTable) loadingSpinnerTable.style.display = 'none';
                    if(loadingText) {
                        loadingText.className = "text-red-600 font-bold text-sm text-center px-4";
                        loadingText.innerText = "Gagal memuat data. Mohon pastikan deployment Apps Script Anda disetel ke 'Semua Orang' (Anyone).";
                    }
                });
        }

        function renderTable(dataArray) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            if (!dataArray || dataArray.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="px-4 py-8 text-center text-gray-500">Belum ada data pengunjung.</td></tr>';
                return;
            }

            // Dibalik agar data terbaru di atas
            for (let i = dataArray.length - 1; i >= 0; i--) {
                const visitor = dataArray[i];
                const tr = document.createElement('tr');
                tr.className = "bg-white border-b hover:bg-gray-50";
                
                tr.innerHTML = `
                    <td class="px-4 py-3">
                        <div class="text-gray-800 font-medium">${visitor.tanggal}</div>
                        <div class="text-xs text-gray-500">${visitor.waktu}</div>
                    </td>
                    <td class="px-4 py-3">
                        <div class="font-bold text-emerald-800">${visitor.nama}</div>
                        <div class="text-xs text-gray-500 font-mono">${visitor.identitas}</div>
                    </td>
                    <td class="px-4 py-3 font-semibold text-gray-600">${visitor.umur} <span class="font-normal text-xs text-gray-400">${visitor.jk}</span></td>
                    <td class="px-4 py-3">
                        <div class="text-sm font-semibold">${visitor.kategori}</div>
                        <div class="text-xs text-gray-500">${visitor.alamat}</div>
                    </td>
                `;
                tbody.appendChild(tr);
            }
        }

        // --- CREATE DATA (Menyimpan Data Baru) ---
        const form = document.getElementById('visitorForm');
        form.addEventListener('submit', e => {
            e.preventDefault();
            if(!scriptURL || scriptURL.includes('MASUKKAN_URL')) {
                alert("Masukkan URL Script Anda terlebih dahulu!"); return;
            }

            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const loadingSpinner = document.getElementById('loadingSpinner');

            submitBtn.disabled = true; submitBtn.classList.replace('bg-emerald-600', 'bg-emerald-400');
            btnText.innerText = "Menyimpan..."; loadingSpinner.style.display = 'block';

            // Menggunakan URLSearchParams agar formatnya 100% terbaca oleh Google Apps Script
            const formData = new URLSearchParams(new FormData(form));
            formData.append('waktu', new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }));
            formData.append('tanggal', `${new Date().getDate()}/${new Date().getMonth() + 1}/${new Date().getFullYear()}`);
            formData.append('action', 'insert');

            fetch(scriptURL, { 
                method: 'POST', 
                body: formData, 
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            })
                .then(() => {
                    form.reset();
                    showToast("Data baru berhasil disimpan!");
                    
                    // Beri waktu 2 detik untuk Google Sheets memproses
                    setTimeout(() => {
                        loadData(); 
                    }, 2000);
                })
                .catch(() => showToast("Gagal menyimpan data.", true))
                .finally(() => {
                    submitBtn.disabled = false; submitBtn.classList.replace('bg-emerald-400', 'bg-emerald-600');
                    btnText.innerText = "Simpan Data"; loadingSpinner.style.display = 'none';
                });
        });

        // Auto load saat pertama kali dibuka
        window.onload = () => {
            if(scriptURL && !scriptURL.includes('MASUKKAN_URL')) {
                loadData();
            }
        };
    </script>
</body>
</html>
