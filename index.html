<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buku Kunjungan Perpustakaan Nagari</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
        }
        .table-container::-webkit-scrollbar { height: 8px; width: 8px; }
        .table-container::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .table-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .table-container::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .bg-pattern {
            background-color: #047857; 
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23059669' fill-opacity='0.4'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        /* Loading spinner */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-800 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-pattern text-white shadow-lg border-b-4 border-yellow-400">
        <div class="max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-4">
                <div class="bg-white p-2 rounded-lg shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-emerald-700" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-wide text-center sm:text-left">Sistem Buku Tamu Terintegrasi</h1>
                    <p class="text-emerald-100 text-sm font-medium text-center sm:text-left">Perpustakaan Nagari / Desa</p>
                </div>
            </div>
            <div class="text-center sm:text-right bg-black/20 p-2 px-4 rounded-lg backdrop-blur-sm">
                <p id="currentDate" class="text-sm text-emerald-50"></p>
                <p id="currentTime" class="font-bold text-xl tracking-wider"></p>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8 w-full">
        <div class="flex flex-col lg:flex-row gap-8">
            
            <!-- Form Section -->
            <div class="w-full lg:w-1/3 bg-white p-6 rounded-2xl shadow-md border border-gray-100 h-fit">
                <h2 class="text-xl font-bold border-b-2 border-emerald-100 pb-3 mb-6 flex items-center gap-2 text-emerald-800">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                    </svg>
                    Isi Data Kunjungan
                </h2>
                
                <form id="visitorForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Nama Lengkap <span class="text-red-500">*</span></label>
                        <input type="text" id="nama" name="nama" required placeholder="Masukkan nama pengunjung" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1.5">No. Identitas (NIK/NISN) <span class="text-red-500">*</span></label>
                        <input type="text" id="identitas" name="identitas" required placeholder="Masukkan NIK atau NISN" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Umur <span class="text-red-500">*</span></label>
                            <input type="number" id="umur" name="umur" required min="1" max="100" placeholder="Tahun" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Jenis Kelamin <span class="text-red-500">*</span></label>
                            <select id="jk" name="jk" required class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all">
                                <option value="" disabled selected>Pilih</option>
                                <option value="L">L</option>
                                <option value="P">P</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Pekerjaan/Status <span class="text-red-500">*</span></label>
                        <select id="kategori" name="kategori" required class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all">
                            <option value="" disabled selected>Pilih Kategori</option>
                            <option value="Pelajar (SD/SMP/SMA)">Pelajar (SD/SMP/SMA)</option>
                            <option value="Mahasiswa">Mahasiswa</option>
                            <option value="Petani/Pekebun">Petani / Pekebun</option>
                            <option value="Wiraswasta/Pedagang">Wiraswasta / Pedagang</option>
                            <option value="PNS/Pegawai Nagari">PNS / Perangkat Nagari</option>
                            <option value="Ibu Rumah Tangga">Ibu Rumah Tangga</option>
                            <option value="Lainnya">Lainnya</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Alamat (Jorong/Dusun) <span class="text-red-500">*</span></label>
                        <input type="text" id="alamat" name="alamat" required placeholder="Contoh: Jorong Mawar" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Tujuan Kunjungan <span class="text-red-500">*</span></label>
                        <select id="tujuan" name="tujuan" required class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all">
                            <option value="" disabled selected>Pilih Tujuan</option>
                            <option value="Membaca Buku">Membaca Buku</option>
                            <option value="Meminjam Buku">Meminjam Buku</option>
                            <option value="Mengembalikan Buku">Mengembalikan Buku</option>
                            <option value="Mengerjakan Tugas/Belajar">Mengerjakan Tugas / Belajar</option>
                            <option value="Bermain Edukasi">Bermain Edukasi (Anak-anak)</option>
                            <option value="Mengikuti Kegiatan Nagari">Mengikuti Kegiatan/Penyuluhan</option>
                        </select>
                    </div>

                    <div class="pt-4">
                        <button type="submit" id="submitBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg transform transition-all flex justify-center items-center gap-2">
                            <span id="btnText">Simpan ke Server Nagari</span>
                            <div id="loadingSpinner" class="loader"></div>
                            <svg id="btnIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                            </svg>
                        </button>
                    </div>
                </form>
            </div>

            <!-- Table Section -->
            <div class="w-full lg:w-2/3 bg-white p-6 rounded-2xl shadow-md border border-gray-100 flex flex-col">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b-2 border-emerald-100 pb-3 mb-5 gap-4">
                    <h2 class="text-xl font-bold flex items-center gap-2 text-emerald-800">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                        Kunjungan Hari Ini (Tersinkronisasi)
                    </h2>
                    <div class="flex gap-3 w-full sm:w-auto items-center">
                        <span id="visitorCount" class="bg-emerald-50 text-emerald-700 text-sm font-bold px-3 py-1.5 rounded-lg border border-emerald-200 whitespace-nowrap">
                            Total: 0 Orang
                        </span>
                    </div>
                </div>

                <div class="table-container overflow-x-auto flex-grow rounded-xl border border-gray-200">
                    <table class="w-full text-sm text-left text-gray-600 whitespace-nowrap">
                        <thead class="text-xs text-gray-700 uppercase bg-emerald-50 border-b-2 border-emerald-100">
                            <tr>
                                <th scope="col" class="px-5 py-4 font-bold">Waktu</th>
                                <th scope="col" class="px-5 py-4 font-bold">Nama / NIK</th>
                                <th scope="col" class="px-5 py-4 font-bold text-center">U/JK</th>
                                <th scope="col" class="px-5 py-4 font-bold">Status</th>
                                <th scope="col" class="px-5 py-4 font-bold">Asal Jorong</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr id="emptyState" class="bg-white">
                                <td colspan="5" class="px-4 py-12 text-center">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto text-gray-300 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4" />
                                    </svg>
                                    <p class="text-gray-500 font-medium">Belum ada data baru hari ini.</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 bg-emerald-600 text-white px-6 py-4 rounded-xl shadow-2xl flex items-center gap-3 z-50 border-2 border-emerald-400">
        <div class="bg-white/20 p-1 rounded-full">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
            </svg>
        </div>
        <span id="toastMessage" class="font-semibold">Sukses! Data terkirim ke Google Sheets.</span>
    </div>

    <script>
        // ==========================================
        // GANTI URL DI BAWAH INI DENGAN URL WEB APP ANDA
        // ==========================================
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzVviDuS3o8mBqKOkqSAMnO20-XI0HvUvQvHnbmkrEAVDq_qgETGt0QP20V_APYQCvS/exec';
        // ==========================================

        let visitorData = [];

        // Real-time Clock
        function updateClock() {
            const now = new Date();
            const optionsDate = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('currentDate').innerText = now.toLocaleDateString('id-ID', optionsDate);
            document.getElementById('currentTime').innerText = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) + ' WIB';
        }
        setInterval(updateClock, 1000);
        updateClock();

        function getFormattedTime() {
            return new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
        }
        
        function getFormattedDateString() {
            const now = new Date();
            return `${now.getDate()}/${now.getMonth() + 1}/${now.getFullYear()}`;
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => { toast.classList.add('translate-y-20', 'opacity-0'); }, 4000);
        }

        const form = document.getElementById('visitorForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');
        const loadingSpinner = document.getElementById('loadingSpinner');

        // Handle Form Submission to Google Sheets
        form.addEventListener('submit', e => {
            e.preventDefault();
            
            if(scriptURL === 'MASUKKAN_URL_APPS_SCRIPT_ANDA_DISINI') {
                alert("Peringatan: URL Google Apps Script belum diisi di kode HTML!");
                return;
            }

            // UI Loading State
            submitBtn.disabled = true;
            submitBtn.classList.replace('bg-emerald-600', 'bg-emerald-400');
            btnText.innerText = "Menyimpan ke server...";
            btnIcon.style.display = 'none';
            loadingSpinner.style.display = 'block';

            // Gather Data
            const formData = new FormData(form);
            const waktu = getFormattedTime();
            const tanggal = getFormattedDateString();
            formData.append('waktu', waktu);
            formData.append('tanggal', tanggal);

            // Fetch to Google Sheets
            fetch(scriptURL, { method: 'POST', body: formData})
                .then(response => {
                    // Berhasil dikirim! Tambahkan ke tabel lokal untuk preview
                    const newVisitor = {
                        waktu: waktu,
                        nama: formData.get('nama'),
                        identitas: formData.get('identitas'),
                        umur: formData.get('umur'),
                        jk: formData.get('jk'),
                        kategori: formData.get('kategori'),
                        alamat: formData.get('alamat')
                    };
                    visitorData.push(newVisitor);
                    updateTable();
                    
                    form.reset();
                    showToast();
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    alert("Gagal mengirim data. Pastikan koneksi internet aktif.");
                })
                .finally(() => {
                    // Reset UI Button
                    submitBtn.disabled = false;
                    submitBtn.classList.replace('bg-emerald-400', 'bg-emerald-600');
                    btnText.innerText = "Simpan ke Server Nagari";
                    btnIcon.style.display = 'block';
                    loadingSpinner.style.display = 'none';
                });
        });

        // Update UI Table (Local preview of what was just sent)
        function updateTable() {
            const tbody = document.getElementById('tableBody');
            const visitorCount = document.getElementById('visitorCount');
            tbody.innerHTML = '';

            for (let i = visitorData.length - 1; i >= 0; i--) {
                const visitor = visitorData[i];
                let badgeClass = "bg-gray-100 text-gray-800 border-gray-200";
                
                if(visitor.kategori.includes("Pelajar")) badgeClass = "bg-blue-50 text-blue-700 border-blue-200";
                if(visitor.kategori.includes("Petani") || visitor.kategori.includes("Wiraswasta")) badgeClass = "bg-amber-50 text-amber-700 border-amber-200";
                if(visitor.kategori.includes("PNS")) badgeClass = "bg-purple-50 text-purple-700 border-purple-200";
                if(visitor.kategori.includes("Mahasiswa")) badgeClass = "bg-emerald-50 text-emerald-700 border-emerald-200";

                const row = document.createElement('tr');
                row.className = "bg-white border-b hover:bg-emerald-50/50 transition-colors";
                row.innerHTML = `
                    <td class="px-5 py-4 text-gray-500">${visitor.waktu}</td>
                    <td class="px-5 py-4">
                        <div class="font-bold text-gray-800">${visitor.nama}</div>
                        <div class="text-xs text-gray-500 mt-0.5 font-mono">${visitor.identitas}</div>
                    </td>
                    <td class="px-5 py-4 text-center">
                        <span class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-gray-100 text-xs font-bold text-gray-600">
                            ${visitor.umur}<span class="text-[10px] text-gray-400 font-normal ml-0.5">${visitor.jk}</span>
                        </span>
                    </td>
                    <td class="px-5 py-4">
                        <span class="px-3 py-1 rounded-full text-xs font-bold border ${badgeClass}">
                            ${visitor.kategori}
                        </span>
                    </td>
                    <td class="px-5 py-4 font-medium">${visitor.alamat}</td>
                `;
                tbody.appendChild(row);
            }
            visitorCount.innerText = `Total: ${visitorData.length} Orang`;
        }
    </script>
</body>
</html>
